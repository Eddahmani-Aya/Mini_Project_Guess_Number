<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    padding: 40px;
    max-width: 500px;
    width: 100%;
}

h1 {
    color: #333;
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
}

.info {
    background: #f0f4ff;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border-left: 4px solid #667eea;
}

.info p {
    margin: 5px 0;
    color: #555;
}

.message {
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-weight: bold;
    text-align: center;
    min-height: 30px;
    background: #e8f5e9;
    color: #2e7d32;
    border: 2px solid #2e7d32;
}

.message.warning {
    background: #fff3e0;
    color: #e65100;
    border-color: #e65100;
}

.message.error {
    background: #ffebee;
    color: #c62828;
    border-color: #c62828;
}

.message.success {
    background: #c8e6c9;
    color: #1b5e20;
    border-color: #1b5e20;
}

.message.hidden {
    display: none;
}

.form-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input[type="number"] {
    flex: 1;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s;
}

input[type="number"]:focus {
    outline: none;
    border-color: #667eea;
}

button {
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.btn-submit {
    background: #667eea;
    color: white;
    min-width: 100px;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-reset {
    background: #ff6b6b;
    color: white;
    width: 100%;
    padding: 12px;
}

.btn-reset:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
}

.guesses {
    background: #f5f5f5;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.guesses.hidden {
    display: none;
}

.guesses h3 {
    color: #333;
    margin-bottom: 10px;
    font-size: 14px;
}

.guesses-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.guess-item {
    background: #667eea;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
}

.disabled {
    opacity: 0.6;
    pointer-events: none;
}
</style>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Devinette</title>
</head>
<body>
    <div class="container">
        <h1>🎮 Devinette Mystérieuse</h1>
        
        <div class="info">
            <p><strong>Objectif :</strong> Devinez le nombre secret entre 1 et 100</p>
            <p><strong>Tentatives restantes :</strong> <span id="remaining">10</span> / 10</p>
        </div>
        
        <div id="message" class="message hidden"></div>
        
        <form id="guessForm" method="POST" action="game.php">
            <div class="form-group">
                <input 
                    type="number" 
                    id="guessInput"
                    name="guess" 
                    min="1" 
                    max="100" 
                    placeholder="Entrez votre nombre..."
                    required
                    autofocus
                >
                <button type="submit" class="btn-submit">Valider</button>
            </div>
        </form>
        
        <div id="guesses" class="guesses hidden">
            <h3>Vos devinettes :</h3>
            <div id="guessesList" class="guesses-list"></div>
        </div>
        
        <form method="POST" action="rest.php">
            <button type="submit" class="btn-reset">🔄 Nouveau Jeu</button>
        </form>
    </div>

    <script>
        // Récupérer les données du serveur
        fetch('game.php', { method: 'GET' })
            .then(response => response.json())
            .then(data => {
                const remaining = 10 - data.attempts;
                document.getElementById('remaining').textContent = remaining;
                
                if (data.message) {
                    const messageDiv = document.getElementById('message');
                    messageDiv.textContent = data.message;
                    messageDiv.className = 'message ' + data.messageType;
                }
                
                if (data.guesses.length > 0) {
                    const guessesList = document.getElementById('guessesList');
                    guessesList.innerHTML = data.guesses
                        .map(g => `<span class="guess-item">${g}</span>`)
                        .join('');
                    document.getElementById('guesses').classList.remove('hidden');
                }
                
                if (data.gameOver) {
                    document.getElementById('guessForm').classList.add('disabled');
                    document.getElementById('guessInput').disabled = true;
                }
            });
    </script>
</body>
</html>
